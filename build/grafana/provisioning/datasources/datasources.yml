apiVersion: 1

# Removes the old Loki datasource, which file provisioning alone won't retract once it's
# already in Grafana's DB - it only reconciles adds/updates against `datasources:` below,
# never deletes what's missing from it.
deleteDatasources:
  - name: Loki
    orgId: 1

datasources:
  - uid: prometheus
    name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

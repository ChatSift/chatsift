auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 336h
  # api/ama-bot are pre-existing containers, not created fresh by this stack - on first
  # discovery promtail reads their whole log file from the start, and the default 168h here
  # would reject weeks of legitimate backlog. Ingested-but-out-of-retention lines just get
  # compacted away on the next cycle same as anything else, so this only matters once, at
  # onboarding.
  reject_old_samples_max_age: 2160h
  # Separate from the above: bounds how far behind a stream's already-seen high-watermark a
  # new entry can be (default ~1h). During this same one-time bulk backfill, batches can land
  # in a different order than strict per-line chronology, tripping this independently of the
  # wall-clock-age check above. Match it to the same window for the same reason.
  out_of_order_time_window: 2160h

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true

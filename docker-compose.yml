name: chatsift-v3

services:
  # caddy:
  #   build:
  #     context: ./build/caddy
  #     dockerfile: ./Dockerfile
  #   env_file:
  #     - ./.env.private
  #   ports:
  #     - '80:80'
  #     - '443:443'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: 'chatsift'
      POSTGRES_PASSWORD: 'admin'
      POSTGRES_DB: 'chatsift'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    env_file:
      - ./.env.public
      - ./.env.private
    ports:
      - 127.0.0.1:${LOCAL_DATABASE_PORT}:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatsift']
      interval: 10s
      timeout: 5s

  loki:
    image: grafana/loki:3.3.0
    restart: unless-stopped
    volumes:
      - ./build/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: ['-config.file=/etc/loki/config.yaml']

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      # Read-only container listing/inspection only - no create/exec/stop/build/etc. This is
      # the one component that touches the raw socket, so promtail (and anything else that
      # needs container metadata) never gets full docker-control access itself.
      CONTAINERS: 1
      EVENTS: 1
      POST: 0
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      SERVICES: 0
      TASKS: 0
      SWARM: 0
      NODES: 0
      PLUGINS: 0
      SYSTEM: 0
      INFO: 0
      DISTRIBUTION: 0
      AUTH: 0
      SECRETS: 0
      CONFIGS: 0
      BUILD: 0
      COMMIT: 0
      EXEC: 0
      LOGS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  promtail:
    image: grafana/promtail:3.3.0
    restart: unless-stopped
    volumes:
      - ./build/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/var/promtail
    command: ['-config.file=/etc/promtail/config.yaml']
    depends_on:
      - loki
      - docker-socket-proxy

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./build/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - cadvisor
      - node-exporter

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    env_file:
      - ./.env.public
      - ./.env.private
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_GENERIC_OAUTH_ENABLED: 'true'
      GF_AUTH_GENERIC_OAUTH_NAME: Discord
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${OAUTH_DISCORD_CLIENT_ID}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${OAUTH_DISCORD_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: 'identify email'
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://discord.com/api/oauth2/authorize
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://discord.com/api/oauth2/token
      GF_AUTH_GENERIC_OAUTH_API_URL: https://discord.com/api/users/@me
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: 'true'
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: 'true'
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: 'true'
      # Derived from ADMINS by ./compose - only those Discord user IDs can log in.
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: ${GRAFANA_OAUTH_ROLE_ATTRIBUTE_PATH}
    volumes:
      - ./build/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - 127.0.0.1:${LOCAL_GRAFANA_PORT}:3000
    depends_on:
      - loki
      - prometheus

  redis:
    image: redis:6-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 10s
      timeout: 5s
    ports:
      - 127.0.0.1:6379:6379

  api:
    image: chatsift/chatsift-next:api
    build:
      context: ./
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.public
      - ./.env.private
    command: ['node', '--enable-source-maps', './services/api/dist/bin.js']
    ports:
      - 127.0.0.1:${API_PORT}:${API_PORT}

  ama-bot:
    image: chatsift/chatsift-next:ama
    build:
      context: ./
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.public
      - ./.env.private
    command: ['node', '--enable-source-maps', './services/ama-bot/dist/bin.js']

volumes:
  postgres-data:
    name: 'chatsift-v3-postgres-data'
  loki-data:
    name: 'chatsift-v3-loki-data'
  promtail-positions:
    name: 'chatsift-v3-promtail-positions'
  prometheus-data:
    name: 'chatsift-v3-prometheus-data'
  grafana-data:
    name: 'chatsift-v3-grafana-data'

networks:
  default:
    name: chatsift-v3
